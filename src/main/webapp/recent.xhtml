<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets">

<ui:composition template="./template.xhtml">

    <ui:define name="title">
        Recent - Drive
    </ui:define>

    <ui:define name="content">
        <h:messages globalOnly="true" styleClass="messages" />

        <div class="page-header">
            <h2 class="page-title">Recent</h2>
        </div>

        <h:panelGroup rendered="#{fileBean.recentFiles.size() > 0}">
            <div class="table-container">
                <h:form style="margin: 0;">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th style="width: 160px;">Created at</th>
                                <th style="width: 150px;">Type</th>
                                <th style="width: 180px; text-align: center;">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <ui:repeat value="#{fileBean.recentFiles}" var="file">
                                <tr>
                                    <td>
                                        <div class="file-name-cell">
                                            <i class="fas fa-file-alt file-icon" />
                                            <h:outputText value="#{file.name}" />
                                        </div>
                                    </td>
                                    <td>
                                        <h:outputText value="#{file.createdAt}">
                                            <f:convertDateTime pattern="yyyy-MM-dd HH:mm" />
                                        </h:outputText>
                                    </td>
                                    <td style="color: var(--text-secondary);"><h:outputText value="#{file.type}" /></td>
                                    <td style="text-align: center; display: flex; justify-content: center; gap: 10px;">
                                        <h:commandLink action="#{fileBean.toggleStar(file)}" styleClass="table-action-btn" title="#{file.starred ? 'Remove from starred' : 'Add to starred'}">
                                            <i class="fas fa-star" style="color: #{file.starred ? '#f59e0b' : 'var(--text-secondary)'};" />
                                        </h:commandLink>
                                    </td>
                                </tr>
                            </ui:repeat>
                        </tbody>
                    </table>
                </h:form>
            </div>
        </h:panelGroup>

        <h:panelGroup rendered="#{fileBean.recentFiles.size() == 0}">
            <div class="empty-state">
                <i class="fas fa-clock" style="font-size: 80px; color: #cbd5e1; margin-bottom: 24px;" />
                <h3>No recent files</h3>
                <p>Files you upload will appear here, sorted from newest to oldest.</p>
            </div>
        </h:panelGroup>

    </ui:define>

</ui:composition>
</html>
