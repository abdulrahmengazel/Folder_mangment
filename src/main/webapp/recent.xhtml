<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets">

<ui:composition template="./template.xhtml">

    <ui:define name="title">
        Son dosyalar - Cloud System
    </ui:define>

    <ui:define name="content">
        <h:messages globalOnly="true" styleClass="messages"/>

        <div class="page-header">
            <h2 class="page-title">Son dosyalar</h2>
        </div>

        <h:panelGroup rendered="#{fileBean.recentFiles.size() > 0}">
            <div class="table-container">
                <h:form style="margin: 0;">
                    <table class="data-table">
                        <thead>
                        <tr>
                            <th>Ad</th>
                            <th style="width: 160px;">Oluşturulma</th>
                            <th style="width: 150px;">Tür</th>
                            <th style="width: 180px; text-align: center;">İşlemler</th>
                        </tr>
                        </thead>
                        <tbody>
                        <ui:repeat value="#{fileBean.recentFiles}" var="file">
                            <tr>
                                <td>
                                    <div class="file-name-cell">
                                        <i class="fas fa-file-alt file-icon"/>
                                        <h:outputText value="#{file.name}"/>
                                    </div>
                                </td>
                                <td>
                                    <h:outputText value="#{file.createdAt}">
                                        <f:convertDateTime pattern="yyyy-MM-dd HH:mm"/>
                                    </h:outputText>
                                </td>
                                <td style="color: var(--text-secondary);"><h:outputText value="#{file.type}"/></td>
                                <td style="text-align: center; display: flex; justify-content: center; gap: 10px;">
                                    <h:commandLink action="#{fileBean.toggleStar(file)}" styleClass="table-action-btn"
                                                   title="#{file.starred ? 'Yıldızdan kaldır' : 'Yıldız ekle'}">
                                        <i class="fas fa-star"
                                           style="color: #{file.starred ? '#f59e0b' : 'var(--text-secondary)'};"/>
                                    </h:commandLink>
                                </td>
                            </tr>
                        </ui:repeat>
                        </tbody>
                    </table>
                </h:form>
            </div>
        </h:panelGroup>

        <h:panelGroup rendered="#{fileBean.recentFiles.size() == 0}">
            <div class="empty-state">
                <i class="fas fa-clock" style="font-size: 80px; color: #cbd5e1; margin-bottom: 24px;"/>
                <h3>Son dosya yok</h3>
                <p>Yüklediğiniz dosyalar burada en yeniden eskiye doğru listelenecektir.</p>
            </div>
        </h:panelGroup>

    </ui:define>

</ui:composition>
</html>
