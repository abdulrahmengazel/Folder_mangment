<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets">

<ui:composition template="./template.xhtml">

    <ui:define name="title">
        Yıldızlılar - Cloud System
    </ui:define>

    <ui:define name="content">
        <h:messages globalOnly="true" styleClass="messages"/>

        <div class="page-header">
            <h2 class="page-title">Yıldızlılar</h2>
        </div>

        <h:panelGroup rendered="#{fileBean.starredFiles.size() > 0}">
            <div class="table-container">
                <h:form style="margin: 0;">
                    <table class="data-table">
                        <thead>
                        <tr>
                            <th>Ad</th>
                            <th style="width: 160px;">Oluşturulma</th>
                            <th style="width: 150px;">Tür</th>
                            <th style="width: 180px; text-align: center;">İşlemler</th>
                        </tr>
                        </thead>
                        <tbody>
                        <ui:repeat value="#{fileBean.starredFiles}" var="file">
                            <tr>
                                <td>
                                    <div class="file-name-cell">
                                        <i class="fas fa-file-alt file-icon" style="color: #f59e0b;"/>
                                        <h:outputText value="#{file.name}"/>
                                    </div>
                                </td>
                                <td>
                                    <h:outputText value="#{file.createdAt}">
                                        <f:convertDateTime pattern="yyyy-MM-dd HH:mm"/>
                                    </h:outputText>
                                </td>
                                <td style="color: var(--text-secondary);"><h:outputText value="#{file.type}"/></td>
                                <td style="text-align: center; display: flex; justify-content: center; gap: 10px;">
                                    <h:commandLink action="#{fileBean.toggleStar(file)}" styleClass="table-action-btn"
                                                   title="Yıldızdan kaldır">
                                        <i class="fas fa-star" style="color: #f59e0b;"/>
                                    </h:commandLink>
                                </td>
                            </tr>
                        </ui:repeat>
                        </tbody>
                    </table>
                </h:form>
            </div>
        </h:panelGroup>

        <h:panelGroup rendered="#{fileBean.starredFiles.size() == 0}">
            <div class="empty-state">
                <i class="fas fa-star" style="font-size: 80px; color: #cbd5e1; margin-bottom: 24px;"/>
                <h3>Yıldızlı dosya yok</h3>
                <p>Daha sonra hızlıca bulmak istediğiniz dosyalara yıldız ekleyin.</p>
            </div>
        </h:panelGroup>

    </ui:define>

</ui:composition>
</html>
