<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets">

<ui:composition template="./template.xhtml">

    <ui:define name="title">
        Starred - Drive
    </ui:define>

    <ui:define name="content">
        <h:messages globalOnly="true" styleClass="messages" />

        <div class="page-header">
            <h2 class="page-title">Starred</h2>
        </div>

        <h:panelGroup rendered="#{fileBean.starredFiles.size() > 0}">
            <div class="table-container">
                <h:form style="margin: 0;">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th style="width: 160px;">Created at</th>
                                <th style="width: 150px;">Type</th>
                                <th style="width: 180px; text-align: center;">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <ui:repeat value="#{fileBean.starredFiles}" var="file">
                                <tr>
                                    <td>
                                        <div class="file-name-cell">
                                            <i class="fas fa-file-alt file-icon" style="color: #f59e0b;" />
                                            <h:outputText value="#{file.name}" />
                                        </div>
                                    </td>
                                    <td>
                                        <h:outputText value="#{file.createdAt}">
                                            <f:convertDateTime pattern="yyyy-MM-dd HH:mm" />
                                        </h:outputText>
                                    </td>
                                    <td style="color: var(--text-secondary);"><h:outputText value="#{file.type}" /></td>
                                    <td style="text-align: center; display: flex; justify-content: center; gap: 10px;">
                                        <h:commandLink action="#{fileBean.toggleStar(file)}" styleClass="table-action-btn" title="Remove from starred">
                                            <i class="fas fa-star" style="color: #f59e0b;" />
                                        </h:commandLink>
                                    </td>
                                </tr>
                            </ui:repeat>
                        </tbody>
                    </table>
                </h:form>
            </div>
        </h:panelGroup>

        <h:panelGroup rendered="#{fileBean.starredFiles.size() == 0}">
            <div class="empty-state">
                <i class="fas fa-star" style="font-size: 80px; color: #cbd5e1; margin-bottom: 24px;" />
                <h3>No starred files</h3>
                <p>Add stars to files you want to find quickly later.</p>
            </div>
        </h:panelGroup>

    </ui:define>

</ui:composition>
</html>
