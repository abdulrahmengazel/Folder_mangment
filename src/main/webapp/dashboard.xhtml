<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets">

<ui:composition template="./template.xhtml">

    <ui:define name="title">
        Google Drive - My Drive
    </ui:define>

    <ui:define name="content">

        <style>
            .drive-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 20px;
                border-bottom: 1px solid #dadce0;
                padding-bottom: 15px;
            }
            .drive-title {
                font-size: 18px;
                color: #202124;
                font-weight: 400;
                margin: 0;
            }
            .action-buttons {
                display: flex;
                gap: 15px;
            }
            .btn-drive {
                background: #ffffff;
                color: #3c4043 !important;
                border: 1px solid #dadce0;
                border-radius: 24px;
                padding: 8px 20px;
                font-weight: 500;
                display: flex;
                align-items: center;
                gap: 10px;
                box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3);
                transition: background 0.2s, box-shadow 0.2s;
                text-decoration: none;
                font-size: 14px;
            }
            .btn-drive:hover {
                background: #f8f9fa;
                box-shadow: 0 1px 3px 1px rgba(60,64,67,0.15);
            }

            .section-label {
                font-size: 14px;
                font-weight: 500;
                color: #5f6368;
                margin-top: 20px;
                margin-bottom: 15px;
            }

            .folders-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
                gap: 20px;
            }

            .folder-card {
                background: #ffffff;
                border: 1px solid #dadce0;
                border-radius: 8px;
                padding: 15px;
                display: flex;
                align-items: center;
                justify-content: space-between;
                cursor: pointer;
                transition: background 0.2s;
                text-decoration: none;
                color: #3c4043;
            }

            .folder-card:hover {
                background: #f1f3f4;
            }

            .folder-info {
                display: flex;
                align-items: center;
                gap: 15px;
            }

            .folder-icon {
                color: #5f6368;
                font-size: 24px;
            }

            .folder-name {
                font-weight: 500;
                font-size: 14px;
                color: #3c4043;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
                max-width: 150px;
            }

            .empty-state {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 60px 20px;
                color: #5f6368;
                text-align: center;
            }
            .empty-state i {
                font-size: 64px;
                color: #dadce0;
                margin-bottom: 20px;
            }
        </style>

        <h:messages globalOnly="true" styleClass="messages" style="list-style-type: none; padding-left: 0; font-weight: 500;"/>

        <div class="drive-header">
            <h2 class="drive-title">My Drive</h2>
            <div class="action-buttons">
                <h:link outcome="new-folder.xhtml" styleClass="btn-drive">
                    <i class="fas fa-plus" style="color: #1a73e8; font-size: 16px;"></i> New folder
                </h:link>
                <h:link outcome="upload-file.xhtml" styleClass="btn-drive">
                    <i class="fas fa-file-upload" style="color: #1a73e8; font-size: 16px;"></i> File upload
                </h:link>
            </div>
        </div>

        <h:panelGroup rendered="#{folderBean.foldersList.size() > 0}">
            <div class="section-label">Folders</div>
            <div class="folders-grid">
                <ui:repeat value="#{folderBean.foldersList}" var="folder">
                    <h:link outcome="folder-content.xhtml" styleClass="folder-card">
                        <f:param name="folderId" value="#{folder.id}" />
                        <div class="folder-info">
                            <i class="fas fa-folder folder-icon"></i>
                            <span class="folder-name">#{folder.name}</span>
                        </div>
                        <h:form style="margin: 0; padding: 0;" onclick="event.stopPropagation();">
                            <h:commandLink action="#{folderBean.deleteFolder(folder)}" style="color: #5f6368;" title="Remove folder" onclick="return confirm('Are you sure you want to delete this folder?');">
                                <i class="fas fa-ellipsis-v"></i>
                            </h:commandLink>
                        </h:form>
                    </h:link>
                </ui:repeat>
            </div>
        </h:panelGroup>

        <h:panelGroup rendered="#{folderBean.foldersList.size() == 0}">
            <div class="empty-state">
                <img src="https://ssl.gstatic.com/docs/doclist/images/empty_state_my_drive_v2.svg" alt="Empty Drive" style="width: 250px; margin-bottom: 20px;"/>
                <h3>A place for all of your files</h3>
                <p>Use the "New" button to upload files and create folders.</p>
            </div>
        </h:panelGroup>

    </ui:define>

</ui:composition>
</html>
