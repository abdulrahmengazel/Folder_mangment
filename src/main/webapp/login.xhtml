<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      lang="tr"
      xmlns:h="jakarta.faces.html"
      xmlns:a="http://xmlns.jcp.org/jsf/passthrough">
<h:head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Giriş Yap - Cloud System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Roboto:wght@400;500&amp;display=swap"
          rel="stylesheet"/>
    <!-- Load CSS correctly -->
    <h:outputStylesheet name="css/style.css"/>
    <link rel="stylesheet" type="text/css" href="#{request.contextPath}/resources/css/style.css?v=2.0"/>
    <style>
        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 24px;
        }

        .auth-container {
            width: 100%;
            max-width: 440px;
            background: var(--surface-color);
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .auth-header {
            text-align: center;
            padding: 40px 40px 24px;
        }

        .auth-logo {
            width: 56px;
            height: 56px;
            margin-bottom: 24px;
        }

        .auth-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .auth-subtitle {
            font-size: 15px;
            color: var(--text-secondary);
            margin: 0;
        }

        .auth-form {
            padding: 0 40px 40px;
        }

        .form-group {
            margin-bottom: 24px;
            text-align: left;
        }

        .auth-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 32px;
        }

        .auth-link {
            font-size: 14px;
            font-weight: 600;
            color: var(--primary-color);
            transition: color 0.2s;
        }

        .auth-link:hover {
            color: var(--primary-hover);
        }
    </style>
</h:head>
<h:body>

    <div class="auth-container">
        <div class="auth-header">
            <div class="auth-logo"
                 style="margin-left: auto; margin-right: auto; border-radius: 18px; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, var(--primary-color), #7c3aed); color: white; box-shadow: 0 12px 24px rgba(37, 99, 235, 0.22);">
                <i class="fas fa-cloud" style="font-size: 22px;"></i>
            </div>
            <h1 class="auth-title">Giriş yap</h1>
            <p class="auth-subtitle">Cloud System'e devam etmek için giriş yapın</p>
        </div>

        <div class="auth-form">
            <h:form id="loginForm">
                <h:messages globalOnly="true" styleClass="messages"/>

                <div class="form-group">
                    <label class="form-label">E-posta veya telefon</label>
                    <h:inputText id="email" value="#{loginBean.user.email}" required="true"
                                 requiredMessage="Lütfen bir e-posta girin" styleClass="form-control"
                                 a:placeholder="ornek@site.com"/>
                </div>

                <div class="form-group">
                    <label class="form-label">Şifre</label>
                    <h:inputSecret id="password" value="#{loginBean.user.password}" required="true"
                                   requiredMessage="Lütfen şifrenizi girin" styleClass="form-control"
                                   a:placeholder="Şifrenizi girin"/>
                </div>

                <div class="auth-actions">
                    <h:link value="Hesap oluştur" outcome="register.xhtml" styleClass="auth-link"/>
                    <h:commandButton value="Giriş yap" action="#{loginBean.login()}" styleClass="btn btn-primary"
                                     style="padding: 12px 24px; font-size: 15px; border-radius: 12px;"/>
                </div>

            </h:form>
        </div>
    </div>

</h:body>
</html>
