<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core">
<h:head>
    <title>Sisteme Giriş</title>
</h:head>
<h:body>
    <h:form id="loginForm">
        <h2>Kullanıcı Girişi</h2>

        <!-- قسم عرض رسائل الخطأ القادمة من المتحكم -->
        <h:messages globalOnly="true" style="color:red; font-weight:bold;"/>

        <h:panelGrid columns="2" cellpadding="5">
            <h:outputLabel for="email" value="E-posta:"/>
            <h:inputText id="email" value="#{loginBean.user.email}" required="true" requiredMessage="E-posta alanı boş bırakılamaz!"/>

            <h:outputLabel for="password" value="Parola:"/>
            <h:inputSecret id="password" value="#{loginBean.user.password}" required="true" requiredMessage="Parola alanı boş bırakılamaz!"/>

            <h:panelGroup/>
            <h:commandButton value="Giriş Yap" action="#{loginBean.login()}"/>

            <br/>
            <h:link value="Hesabınız yok mu? Yeni kayıt oluşturun." outcome="register.xhtml" />
        </h:panelGrid>
    </h:form>
</h:body>
</html>
