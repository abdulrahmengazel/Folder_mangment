<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets">

<f:metadata>
    <f:viewParam name="folderId" value="#{folderContentBean.folderId}" />
    <f:viewAction action="#{folderContentBean.init}" />
</f:metadata>

<ui:composition template="./template.xhtml">

    <ui:define name="title">
        <h:outputText value="#{folderContentBean.currentFolder.name}" /> - Google Drive
    </ui:define>

    <ui:define name="content">
        <style>
            .breadcrumb {
                display: flex;
                align-items: center;
                gap: 10px;
                font-size: 18px;
                color: #5f6368;
                margin-bottom: 20px;
                border-bottom: 1px solid #dadce0;
                padding-bottom: 15px;
            }
            .breadcrumb a {
                color: #5f6368;
                text-decoration: none;
            }
            .breadcrumb a:hover {
                text-decoration: underline;
            }
            .breadcrumb-separator {
                font-size: 14px;
            }
            .current-folder {
                color: #202124;
                font-weight: 500;
            }

            .action-buttons {
                display: flex;
                gap: 15px;
                margin-bottom: 20px;
            }
            .btn-drive {
                background: #ffffff;
                color: #3c4043 !important;
                border: 1px solid #dadce0;
                border-radius: 24px;
                padding: 8px 20px;
                font-weight: 500;
                display: flex;
                align-items: center;
                gap: 10px;
                box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3);
                transition: background 0.2s, box-shadow 0.2s;
                text-decoration: none;
                font-size: 14px;
            }
            .btn-drive:hover {
                background: #f8f9fa;
                box-shadow: 0 1px 3px 1px rgba(60,64,67,0.15);
            }

            .section-label {
                font-size: 14px;
                font-weight: 500;
                color: #5f6368;
                margin-top: 20px;
                margin-bottom: 15px;
            }

            .files-table {
                width: 100%;
                border-collapse: collapse;
            }

            .files-table th {
                text-align: left;
                padding: 10px;
                font-size: 14px;
                font-weight: 500;
                color: #5f6368;
                border-bottom: 1px solid #dadce0;
            }

            .files-table td {
                padding: 12px 10px;
                border-bottom: 1px solid #dadce0;
                color: #3c4043;
                font-size: 14px;
            }

            .files-table tr:hover {
                background-color: #f5f5f5;
            }

            .file-name-cell {
                display: flex;
                align-items: center;
                gap: 15px;
                font-weight: 500;
            }

            .file-icon {
                color: #1a73e8;
                font-size: 20px;
            }

            .empty-state {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 60px 20px;
                color: #5f6368;
                text-align: center;
            }
        </style>

        <h:messages globalOnly="true" styleClass="messages" style="list-style-type: none; padding-left: 0; font-weight: 500;"/>

        <!-- Breadcrumb Navigation -->
        <div class="breadcrumb">
            <h:link outcome="dashboard.xhtml">My Drive</h:link>
            <i class="fas fa-chevron-right breadcrumb-separator"></i>
            <span class="current-folder"><h:outputText value="#{folderContentBean.currentFolder.name}" /></span>
        </div>

        <div class="action-buttons">
            <!-- Dosya Yükle butonunu kaldırdık/gizledik, Drive'da genelde sağ tık veya üst menüden yapılır, ama şimdilik sadeleştirelim -->
        </div>

        <div class="section-label">Files</div>

        <h:panelGroup rendered="#{folderContentBean.filesInFolder.size() > 0}">
            <h:form id="folderFilesForm">
                <table class="files-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Size</th>
                            <th>Type</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <ui:repeat value="#{folderContentBean.filesInFolder}" var="file">
                            <tr>
                                <td>
                                    <div class="file-name-cell">
                                        <i class="fas fa-file-alt file-icon"></i>
                                        <h:outputText value="#{file.name}" />
                                    </div>
                                </td>
                                <td>
                                    <h:outputText value="#{file.size / 1024}">
                                        <f:convertNumber maxFractionDigits="2"/>
                                    </h:outputText> KB
                                </td>
                                <td><h:outputText value="#{file.type}" /></td>
                                <td>
                                    <h:commandLink action="#{folderContentBean.deleteFile(file)}" title="Remove file" onclick="return confirm('Are you sure you want to delete this file?');" style="color: #5f6368; font-size: 18px; margin-right: 15px;">
                                        <i class="fas fa-trash"></i>
                                    </h:commandLink>
                                </td>
                            </tr>
                        </ui:repeat>
                    </tbody>
                </table>
            </h:form>
        </h:panelGroup>

        <h:panelGroup rendered="#{folderContentBean.filesInFolder.size() == 0}">
            <div class="empty-state">
                <img src="https://ssl.gstatic.com/docs/doclist/images/empty_state_my_drive_v2.svg" alt="Empty Folder" style="width: 200px; margin-bottom: 20px; opacity: 0.7;"/>
                <h3 style="margin-top: 0; color: #3c4043;">This folder is empty</h3>
                <p>No files were found in this folder.</p>
            </div>
        </h:panelGroup>

    </ui:define>

</ui:composition>
</html>
