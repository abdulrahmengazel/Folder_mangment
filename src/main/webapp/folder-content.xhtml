<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets">

<f:metadata>
    <f:viewParam name="folderId" value="#{folderContentBean.folderId}" />
    <f:viewAction action="#{folderContentBean.init}" />
</f:metadata>

<ui:composition template="./template.xhtml">

    <ui:define name="title">
        <h:outputText value="#{folderContentBean.currentFolder.name}" /> - Drive
    </ui:define>

    <ui:define name="content">

        <h:messages globalOnly="true" styleClass="messages" />

        <!-- Breadcrumb Navigation -->
        <div class="page-header" style="justify-content: flex-start; gap: 16px;">
            <h:link outcome="dashboard.xhtml" style="color: var(--text-secondary); text-decoration: none; font-size: 20px; font-weight: 500; transition: color 0.2s;">
                My Drive
            </h:link>
            <i class="fas fa-chevron-right" style="color: #94a3b8; font-size: 14px;"></i>
            <h2 class="page-title" style="font-weight: 600;"><h:outputText value="#{folderContentBean.currentFolder.name}" /></h2>
        </div>

        <!-- Action Row -->
        <div style="display: flex; justify-content: flex-end; margin-bottom: 24px;">
            <h:link outcome="upload-file.xhtml" styleClass="btn btn-outline" style="box-shadow: var(--shadow-sm);">
                <f:param name="targetFolderId" value="#{folderContentBean.currentFolder.id}" />
                <i class="fas fa-file-upload"></i> Upload file here
            </h:link>
        </div>

        <h:panelGroup rendered="#{folderContentBean.filesInFolder.size() > 0}">
            <div class="table-container">
                <h:form id="folderFilesForm" style="margin: 0;">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th style="width: 150px;">Size</th>
                                <th style="width: 150px;">Type</th>
                                <th style="width: 80px; text-align: center;">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <ui:repeat value="#{folderContentBean.filesInFolder}" var="file">
                                <tr>
                                    <td>
                                        <div class="file-name-cell">
                                            <i class="fas fa-file-alt file-icon"></i>
                                            <span><h:outputText value="#{file.name}" /></span>
                                        </div>
                                    </td>
                                    <td>
                                        <h:outputText value="#{file.size / 1024}">
                                            <f:convertNumber maxFractionDigits="2"/>
                                        </h:outputText> KB
                                    </td>
                                    <td style="color: var(--text-secondary);"><h:outputText value="#{file.type}" /></td>
                                    <td style="text-align: center;">
                                        <h:commandLink action="#{folderContentBean.deleteFile(file)}" styleClass="table-action-btn" title="Remove file" onclick="return confirm('Are you sure you want to delete this file?');">
                                            <i class="fas fa-trash-alt"></i>
                                        </h:commandLink>
                                    </td>
                                </tr>
                            </ui:repeat>
                        </tbody>
                    </table>
                </h:form>
            </div>
        </h:panelGroup>

        <h:panelGroup rendered="#{folderContentBean.filesInFolder.size() == 0}">
            <div class="empty-state">
                <i class="fas fa-folder-open" style="font-size: 80px; color: #cbd5e1; margin-bottom: 24px;"></i>
                <h3>This folder is empty</h3>
                <p>Use the "Upload file here" button to add content to this folder.</p>
            </div>
        </h:panelGroup>

    </ui:define>

</ui:composition>
</html>
