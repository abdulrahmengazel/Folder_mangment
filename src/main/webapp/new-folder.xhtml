<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:a="http://xmlns.jcp.org/jsf/passthrough">
<h:outputStylesheet name="css/style.css"/>
<link rel="stylesheet" type="text/css" href="#{request.contextPath}/resources/css/style.css?v=2.0"/>
<ui:composition template="./template.xhtml">

    <ui:define name="title">
        Yeni Klasör - Cloud System
    </ui:define>

    <ui:define name="content">
        <h:messages globalOnly="true" styleClass="messages"/>

        <div class="page-header" style="justify-content: flex-start; gap: 16px; border: none;">
            <h:link outcome="dashboard.xhtml"
                    style="color: var(--text-secondary); text-decoration: none; font-size: 20px; transition: color 0.2s;">
                <i class="fas fa-arrow-left"></i>
            </h:link>
            <h2 class="page-title" style="font-weight: 600;">Yeni klasör oluştur</h2>
        </div>

        <div class="form-card" style="margin-top: 24px;">
            <div style="text-align: center; margin-bottom: 32px;">
                <i class="fas fa-folder-plus" style="font-size: 64px; color: var(--primary-color);"></i>
            </div>

            <h:form id="folderForm">
                <div class="form-group">
                    <label class="form-label">Klasör adı</label>
                    <h:inputText value="#{folderBean.folder.name}" required="true"
                                 requiredMessage="Lütfen bir klasör adı girin" styleClass="form-control"
                                 a:placeholder="Adsız klasör"/>
                </div>

                <div class="form-actions">
                    <h:link value="İptal" outcome="dashboard.xhtml" styleClass="btn btn-outline"/>
                    <h:commandButton value="Oluştur" action="#{folderBean.createFolder()}"
                                     styleClass="btn btn-primary"/>
                </div>
            </h:form>
        </div>

    </ui:define>

</ui:composition>
</html>
