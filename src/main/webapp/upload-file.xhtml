<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:a="http://xmlns.jcp.org/jsf/passthrough">

<ui:composition template="./template.xhtml">

    <ui:define name="title">
        File Upload - Drive
    </ui:define>

    <ui:define name="content">
        <h:messages globalOnly="true" styleClass="messages" />

        <div class="page-header" style="justify-content: flex-start; gap: 16px; border: none;">
            <h:link outcome="dashboard.xhtml" style="color: var(--text-secondary); text-decoration: none; font-size: 20px; transition: color 0.2s;">
                <i class="fas fa-arrow-left"></i>
            </h:link>
            <h2 class="page-title" style="font-weight: 600;">Upload a file</h2>
        </div>

        <div class="form-card" style="margin-top: 24px;">

            <h:form id="uploadForm" enctype="multipart/form-data">
                <div class="form-group">
                    <label class="form-label">Select destination folder</label>
                    <h:selectOneMenu value="#{fileBean.targetFolderId}" required="true" requiredMessage="Please select a folder" styleClass="form-control">
                        <f:selectItem itemLabel="Choose a folder..." itemValue="#{null}" noSelectionOption="true" />
                        <f:selectItems value="#{folderBean.foldersList}" var="folder" itemLabel="#{folder.name}" itemValue="#{folder.id}" />
                    </h:selectOneMenu>
                </div>

                <div class="form-group" style="margin-top: 32px;">
                     <div style="border: 2px dashed #cbd5e1; border-radius: 12px; padding: 48px 24px; text-align: center; background-color: #f8fafc; transition: all 0.2s;">
                        <i class="fas fa-cloud-upload-alt" style="font-size: 48px; color: var(--primary-color); margin-bottom: 16px;"></i>
                        <div style="margin-bottom: 16px; color: var(--text-primary); font-weight: 500;">Select a file to upload</div>
                        <h:inputFile value="#{fileBean.uploadedFile}" required="true" requiredMessage="Please select a file to upload" style="width: 100%; max-width: 300px; margin: 0 auto; color: var(--text-secondary); cursor: pointer;"/>
                    </div>
                </div>

                <div class="form-actions">
                    <h:link value="Cancel" outcome="dashboard.xhtml" styleClass="btn btn-outline" />
                    <h:commandButton value="Upload" action="#{fileBean.uploadFile()}" styleClass="btn btn-primary" />
                </div>
            </h:form>
        </div>

    </ui:define>

</ui:composition>
</html>
