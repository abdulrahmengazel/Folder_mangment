<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:a="http://xmlns.jcp.org/jsf/passthrough">
<h:head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Account - Drive</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Roboto:wght@400;500&amp;display=swap" rel="stylesheet"/>
    <!-- Load CSS correctly -->
    <h:outputStylesheet name="css/style.css" />
    <link rel="stylesheet" type="text/css" href="#{request.contextPath}/resources/css/style.css?v=2.0" />
    <style>
        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 24px;
        }

        .auth-container {
            width: 100%;
            max-width: 480px;
            background: var(--surface-color);
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        .auth-header {
            text-align: center;
            padding: 40px 40px 24px;
        }

        .auth-logo {
            width: 48px;
            height: 48px;
            margin-bottom: 24px;
        }

        .auth-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .auth-subtitle {
            font-size: 15px;
            color: var(--text-secondary);
            margin: 0;
        }

        .auth-form {
            padding: 0 40px 40px;
        }

        .form-group {
            margin-bottom: 24px;
            text-align: left;
        }

        .auth-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 32px;
        }

        .auth-link {
            font-size: 14px;
            font-weight: 600;
            color: var(--primary-color);
            transition: color 0.2s;
        }

        .auth-link:hover {
            color: var(--primary-hover);
        }
    </style>
</h:head>
<h:body>

    <div class="auth-container">
        <div class="auth-header">
            <img src="https://upload.wikimedia.org/wikipedia/commons/1/12/Google_Drive_icon_%282020%29.svg" alt="Drive Logo" class="auth-logo"/>
            <h1 class="auth-title">Create your Account</h1>
            <p class="auth-subtitle">to continue to Drive</p>
        </div>

        <div class="auth-form">
            <h:form id="registerForm">
                <h:messages globalOnly="true" styleClass="messages" />

                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <h:inputText id="name" value="#{userBean.user.name}" required="true"
                                 requiredMessage="Enter first and last name" styleClass="form-control" a:placeholder="e.g. John Doe"/>
                </div>

                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <h:inputText id="email" value="#{userBean.user.email}" required="true"
                                 requiredMessage="Enter your email" styleClass="form-control" a:placeholder="john@example.com"/>
                </div>

                <div class="form-group" style="margin-bottom: 8px;">
                    <label class="form-label">Password</label>
                    <h:inputSecret id="password" value="#{userBean.user.password}" required="true"
                                   requiredMessage="Enter a password" styleClass="form-control" a:placeholder="Create a strong password"/>
                </div>

                <p style="font-size: 13px; color: var(--text-secondary); margin-bottom: 24px;">
                    Use 8 or more characters with a mix of letters, numbers &amp; symbols
                </p>

                <div class="auth-actions">
                    <h:link value="Sign in instead" outcome="login.xhtml" styleClass="auth-link"/>
                    <h:commandButton value="Create Account" action="#{userBean.createUser()}" styleClass="btn btn-primary" style="padding: 12px 24px; font-size: 15px; border-radius: 12px;"/>
                </div>

            </h:form>
        </div>
    </div>

</h:body>
</html>
