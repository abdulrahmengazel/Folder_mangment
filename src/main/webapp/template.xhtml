<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets">
<h:head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title><ui:insert name="title">Drive</ui:insert></title>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Roboto:wght@400;500&amp;display=swap" rel="stylesheet"/>

    <!-- IMPORTANT: Output stylesheet JSF way -->
    <h:outputStylesheet name="css/style.css" />
    <!-- AND traditional way to ensure it loads in case of pathing issues -->
    <link rel="stylesheet" type="text/css" href="#{request.contextPath}/resources/css/style.css?v=#{facesContext.application.projectStage}" />
</h:head>
<h:body>

    <!-- Header -->
    <header class="app-header">
        <div class="header-brand">
            <img src="https://upload.wikimedia.org/wikipedia/commons/1/12/Google_Drive_icon_%282020%29.svg" alt="Drive Logo" style="width: 32px; height: 32px;"/>
            <span>Drive</span>
        </div>

        <!-- Search bar -->
        <div class="search-bar">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="Search in Drive..."/>
        </div>

        <!-- User profile & Logout -->
        <div class="header-actions">
            <h:form style="margin:0; display:flex; align-items:center;">
                <h:commandLink action="#{loginBean.logout()}" title="Sign out" style="color: var(--text-secondary); font-size: 20px; transition: color 0.2s;">
                    <i class="fas fa-sign-out-alt"></i>
                </h:commandLink>
            </h:form>

            <div class="user-avatar" title="#{sessionScope.user.email}">
                <h:outputText value="#{sessionScope.user.name.substring(0,1).toUpperCase()}" rendered="#{not empty sessionScope.user.name}"/>
            </div>
        </div>
    </header>

    <!-- Main Container -->
    <div class="app-body">

        <!-- Left Sidebar Navigation -->
        <aside class="app-sidebar">
            <h:link outcome="new-folder.xhtml" styleClass="sidebar-btn-new" style="text-decoration:none;">
                <i class="fas fa-plus" style="color: var(--primary-color);"></i>
                New
            </h:link>

            <ul class="sidebar-nav">
                <li>
                    <h:link outcome="dashboard.xhtml" styleClass="sidebar-item #{view.viewId == '/dashboard.xhtml' or view.viewId == '/folder-content.xhtml' ? 'active' : ''}">
                        <i class="fas fa-hdd"></i>
                        My Drive
                    </h:link>
                </li>
                <li>
                    <h:link outcome="shared.xhtml" styleClass="sidebar-item #{view.viewId == '/shared.xhtml' ? 'active' : ''}">
                        <i class="fas fa-user-friends"></i>
                        Shared with me
                    </h:link>
                </li>
                <li>
                    <h:link outcome="recent.xhtml" styleClass="sidebar-item #{view.viewId == '/recent.xhtml' ? 'active' : ''}">
                        <i class="fas fa-clock"></i>
                        Recent
                    </h:link>
                </li>
                <li>
                    <h:link outcome="starred.xhtml" styleClass="sidebar-item #{view.viewId == '/starred.xhtml' ? 'active' : ''}">
                        <i class="fas fa-star"></i>
                        Starred
                    </h:link>
                </li>
                <li>
                    <h:link outcome="trash.xhtml" styleClass="sidebar-item #{view.viewId == '/trash.xhtml' ? 'active' : ''}">
                        <i class="fas fa-trash"></i>
                        Trash
                    </h:link>
                </li>
            </ul>

            <div class="storage-container">
                <div class="storage-title">
                    <i class="fas fa-cloud"></i>
                    Storage
                </div>
                <div class="storage-progress">
                    <div class="storage-progress-bar"></div>
                </div>
                <div class="storage-text">2.1 GB of 15 GB used</div>
            </div>
        </aside>

        <!-- Right Main Content -->
        <main class="app-content">
            <ui:insert name="content">
                <!-- Content will be inserted here -->
            </ui:insert>
        </main>
    </div>

</h:body>
</html>
