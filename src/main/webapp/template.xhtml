<?xml version='1.0' encoding='UTF-8' ?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets">
<h:head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title><ui:insert name="title">Drive</ui:insert></title>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
    <h:outputStylesheet name="css/style.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: #f8f9fa;
            color: #202124;
        }

        #page {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Header Styling */
        #header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #ffffff;
            padding: 15px 25px;
            border-bottom: 1px solid #e0e0e0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }

        .header-logo {
            width: 40px;
            height: 40px;
        }

        .header-title {
            font-size: 22px;
            font-weight: 500;
            color: #5f6368;
        }

        /* Search bar */
        .search-container {
            flex: 1;
            max-width: 700px;
            margin: 0 20px;
        }

        .search-box {
            background: #f1f3f4;
            border-radius: 8px;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            transition: background 0.2s, box-shadow 0.2s;
        }

        .search-box:focus-within {
            background: #ffffff;
            box-shadow: 0 1px 1px 0 rgba(65,69,73,0.3), 0 1px 3px 1px rgba(65,69,73,0.15);
        }

        .search-input {
            border: none;
            background: transparent;
            width: 100%;
            font-size: 16px;
            outline: none;
            color: #202124;
        }

        /* Header right */
        .header-right {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #1a73e8;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
        }

        /* Main content area */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 256px;
            padding: 20px 0;
            background-color: #f8f9fa;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .new-button-container {
            padding: 0 15px 15px 15px;
        }

        .btn-new {
            background: #ffffff;
            color: #3c4043;
            border: none;
            border-radius: 16px;
            padding: 15px 24px;
            font-size: 14px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15);
            cursor: pointer;
            transition: background 0.2s, box-shadow 0.2s;
            text-decoration: none;
            width: fit-content;
        }

        .btn-new:hover {
            background: #f8f9fa;
            box-shadow: 0 1px 3px 0 rgba(60,64,67,0.3), 0 4px 8px 3px rgba(60,64,67,0.15);
        }

        .sidebar-menu {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .sidebar-item {
            padding: 10px 24px;
            color: #3c4043;
            cursor: pointer;
            border-radius: 0 24px 24px 0;
            margin-right: 16px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.2s;
        }

        .sidebar-item:hover {
            background-color: #f1f3f4;
        }

        .sidebar-item.active {
            background: #e8f0fe;
            color: #1967d2;
        }

        .sidebar-item i {
            width: 20px;
            text-align: center;
            font-size: 18px;
            color: #5f6368;
        }

        .sidebar-item.active i {
            color: #1967d2;
        }

        .storage-info {
            padding: 20px 24px;
            margin-top: auto;
        }

        .storage-label {
            font-size: 13px;
            color: #3c4043;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .storage-bar {
            background: #e0e0e0;
            height: 4px;
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .storage-used {
            background: #1a73e8;
            height: 100%;
            width: 15%;
            border-radius: 2px;
        }

        .storage-text {
            font-size: 12px;
            color: #5f6368;
        }

        /* Content area */
        #content {
            flex: 1;
            padding: 20px 30px;
            background: #ffffff;
            border-top-left-radius: 16px;
            margin-top: 15px;
            margin-right: 15px;
            margin-bottom: 15px;
            box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3);
            overflow-y: auto;
        }

    </style>
</h:head>
<h:body>

    <div id="page">
        <!-- Header -->
        <div id="header">
            <div class="header-left">
                <img src="https://upload.wikimedia.org/wikipedia/commons/1/12/Google_Drive_icon_%282020%29.svg" alt="Drive Logo" class="header-logo"/>
                <span class="header-title">Drive</span>
            </div>

            <!-- Search bar -->
            <div class="search-container">
                <div class="search-box">
                    <i class="fas fa-search" style="color: #5f6368; font-size: 18px; margin-right: 15px;"></i>
                    <input type="text" class="search-input" placeholder="Search in Drive"/>
                </div>
            </div>

            <!-- User profile & Logout -->
            <div class="header-right">
                <h:form style="margin:0;">
                    <h:commandLink action="/login.xhtml?faces-redirect=true" title="Sign out" style="color: #5f6368; font-size: 20px; text-decoration: none; margin-right: 10px;">
                        <i class="fas fa-sign-out-alt"></i>
                    </h:commandLink>
                </h:form>

                <div class="user-icon" title="#{sessionScope.user.email}">
                    <h:outputText value="#{sessionScope.user.name.substring(0,1).toUpperCase()}" rendered="#{not empty sessionScope.user.name}"/>
                </div>
            </div>
        </div>

        <!-- Main Container -->
        <div class="main-container">

            <!-- Left Sidebar Navigation -->
            <div class="sidebar">

                <div class="new-button-container">
                    <h:link outcome="new-folder.xhtml" styleClass="btn-new">
                        <img src="https://ssl.gstatic.com/docs/doclist/images/create_new_folder_button.png" alt="New" style="width: 20px; height: 20px;"/>
                        New
                    </h:link>
                </div>

                <ul class="sidebar-menu">
                    <li>
                        <h:link outcome="dashboard.xhtml" styleClass="sidebar-item active">
                            <i class="fas fa-hdd"></i>
                            My Drive
                        </h:link>
                    </li>
                    <li>
                        <h:link outcome="shared.xhtml" styleClass="sidebar-item">
                            <i class="fas fa-user-friends"></i>
                            Shared with me
                        </h:link>
                    </li>
                    <li>
                        <a href="#" class="sidebar-item">
                            <i class="fas fa-clock"></i>
                            Recent
                        </a>
                    </li>
                    <li>
                        <a href="#" class="sidebar-item">
                            <i class="fas fa-star"></i>
                            Starred
                        </a>
                    </li>
                    <li>
                        <a href="#" class="sidebar-item">
                            <i class="fas fa-trash"></i>
                            Trash
                        </a>
                    </li>
                </ul>

                <hr style="border: 0; border-top: 1px solid #e0e0e0; margin: 15px 0;" />

                <div class="storage-info">
                    <div class="storage-label">
                        <i class="fas fa-cloud"></i>
                        Storage
                    </div>
                    <div class="storage-bar">
                        <div class="storage-used"></div>
                    </div>
                    <div class="storage-text">2.1 GB of 15 GB used</div>
                </div>
            </div>

            <!-- Right Main Content -->
            <div id="content">
                <ui:insert name="content">
                    <!-- Content will be inserted here -->
                </ui:insert>
            </div>
        </div>

    </div>

</h:body>
</html>
