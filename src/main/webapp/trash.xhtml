<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core"
      xmlns:ui="jakarta.faces.facelets">

<ui:composition template="./template.xhtml">

    <ui:define name="title">
        Trash - Drive
    </ui:define>

    <ui:define name="content">
        <style>
            .page-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding-bottom: 16px;
                margin-bottom: 24px;
                border-bottom: 1px solid var(--border-color);
            }
            .page-title {
                font-size: 18px;
                color: var(--text-primary);
                margin: 0;
                font-weight: 500;
            }
            .empty-state {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 80px 24px;
                text-align: center;
            }
            .empty-state-img {
                width: 250px;
                margin-bottom: 24px;
                opacity: 0.9;
            }
            .empty-state h3 {
                font-size: 20px;
                font-weight: 400;
                color: var(--text-primary);
                margin-bottom: 12px;
            }
            .empty-state p {
                font-size: 14px;
                color: var(--text-secondary);
                max-width: 400px;
            }
            .trash-info-banner {
                background-color: #f1f3f4;
                padding: 12px 16px;
                border-radius: 8px;
                margin-bottom: 24px;
                font-size: 14px;
                color: var(--text-secondary);
                display: flex;
                align-items: center;
                gap: 12px;
            }
        </style>

        <h:messages globalOnly="true" styleClass="messages" />

        <div class="page-header">
            <h2 class="page-title">Trash</h2>
        </div>

        <div class="trash-info-banner">
            <i class="fas fa-info-circle" />
            <span>Items in trash can be restored or deleted permanently.</span>
        </div>

        <h:panelGroup rendered="#{trashBean.deletedFolders.size() > 0}">
            <h3 class="form-label" style="margin-bottom: 16px; font-size: 15px; color: var(--text-secondary);">Deleted folders</h3>
            <div class="table-container" style="margin-bottom: 32px;">
                <h:form style="margin: 0;">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th style="width: 180px; text-align: center;">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <ui:repeat value="#{trashBean.deletedFolders}" var="folder">
                                <tr>
                                    <td>
                                        <div class="file-name-cell">
                                            <i class="fas fa-folder file-icon" style="color: #f59e0b;" />
                                            <h:outputText value="#{folder.name}" />
                                        </div>
                                    </td>
                                    <td style="text-align: center; display: flex; justify-content: center; gap: 10px;">
                                        <h:commandLink action="#{trashBean.restoreFolder(folder)}" styleClass="table-action-btn" title="Restore folder">
                                            <i class="fas fa-undo" />
                                        </h:commandLink>
                                        <h:commandLink action="#{trashBean.permanentlyDeleteFolder(folder)}" styleClass="table-action-btn" title="Delete permanently" onclick="return confirm('Delete this folder permanently? This cannot be undone.');">
                                            <i class="fas fa-trash-alt" />
                                        </h:commandLink>
                                    </td>
                                </tr>
                            </ui:repeat>
                        </tbody>
                    </table>
                </h:form>
            </div>
        </h:panelGroup>

        <h:panelGroup rendered="#{trashBean.deletedFiles.size() > 0}">
            <h3 class="form-label" style="margin-bottom: 16px; font-size: 15px; color: var(--text-secondary);">Deleted files</h3>
            <div class="table-container">
                <h:form style="margin: 0;">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th style="width: 150px;">Size</th>
                                <th style="width: 150px;">Type</th>
                                <th style="width: 180px; text-align: center;">Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <ui:repeat value="#{trashBean.deletedFiles}" var="file">
                                <tr>
                                    <td>
                                        <div class="file-name-cell">
                                            <i class="fas fa-file-alt file-icon" />
                                            <h:outputText value="#{file.name}" />
                                        </div>
                                    </td>
                                    <td>
                                        <h:outputText value="#{file.size / 1024}">
                                            <f:convertNumber maxFractionDigits="2"/>
                                        </h:outputText> KB
                                    </td>
                                    <td style="color: var(--text-secondary);"><h:outputText value="#{file.type}" /></td>
                                    <td style="text-align: center; display: flex; justify-content: center; gap: 10px;">
                                        <h:commandLink action="#{trashBean.restoreFile(file)}" styleClass="table-action-btn" title="Restore file">
                                            <i class="fas fa-undo" />
                                        </h:commandLink>
                                        <h:commandLink action="#{trashBean.permanentlyDeleteFile(file)}" styleClass="table-action-btn" title="Delete permanently" onclick="return confirm('Delete this file permanently? This cannot be undone.');">
                                            <i class="fas fa-trash-alt" />
                                        </h:commandLink>
                                    </td>
                                </tr>
                            </ui:repeat>
                        </tbody>
                    </table>
                </h:form>
            </div>
        </h:panelGroup>

        <h:panelGroup rendered="#{trashBean.deletedFiles.size() == 0 and trashBean.deletedFolders.size() == 0}">
            <div class="empty-state">
                <img src="https://ssl.gstatic.com/docs/doclist/images/empty_state_trash_v2.svg" alt="Trash is empty" class="empty-state-img"/>
                <h3>Trash is empty</h3>
                <p>No items have been moved to the trash.</p>
            </div>
        </h:panelGroup>

    </ui:define>

</ui:composition>
</html>
